<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Module logiciel — Helios Astro vivant</title>
<style>
  html, body {
    margin: 0;
    background: #000;
    color: #e7fbff;
    font-family: Arial, Helvetica, sans-serif;
    height: 100%;
    overflow: hidden;
  }
  #app {
    display: grid;
    grid-template-columns: 320px 1fr;
    height: 100vh;
  }
  .panel {
    background: linear-gradient(180deg, rgba(7,20,28,.96), rgba(0,0,0,.96));
    border-right: 1px solid rgba(103,212,255,.16);
    padding: 18px;
    box-sizing: border-box;
  }
  .panel h1 { margin: 0 0 8px; font-size: 22px; }
  .panel p { margin: 0 0 14px; color: #92ccda; line-height: 1.4; font-size: 13px; }
  .group { margin: 0 0 16px; }
  .group label { display: block; margin-bottom: 6px; font-size: 13px; color: #b5e9f3; }
  .group input, .group select, .group button {
    width: 100%;
    box-sizing: border-box;
    border-radius: 12px;
    border: 1px solid rgba(122,220,255,.18);
    background: rgba(6,18,24,.85);
    color: #e7fbff;
    padding: 10px 12px;
  }
  .group button {
    cursor: pointer;
    background: linear-gradient(180deg, rgba(21,125,164,.7), rgba(8,61,82,.7));
    font-weight: 700;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
  .meta {
    position: absolute;
    right: 16px;
    bottom: 12px;
    color: #7caab5;
    font-size: 12px;
    background: rgba(0,0,0,.28);
    padding: 8px 10px;
    border-radius: 10px;
  }
  @media (max-width: 900px) {
    #app {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
    }
    .panel {
      border-right: 0;
      border-bottom: 1px solid rgba(103,212,255,.16);
    }
  }
</style>
</head>
<body>
<div id="app">
  <div class="panel">
    <h1>Helios Astro — module vivant</h1>
    <p>Visualisation animée inspirée de l’univers du livre. Le centre agit comme noyau de calcul visuel. Export PNG intégré.</p>

    <div class="group">
      <label for="mode">Mode</label>
      <select id="mode">
        <option value="neural">Neural</option>
        <option value="organic">Organique</option>
        <option value="mandala">Mandala</option>
        <option value="fusion" selected>Fusion</option>
      </select>
    </div>

    <div class="group">
      <label for="intensity">Intensité</label>
      <input id="intensity" type="range" min="0.4" max="2.5" step="0.01" value="1.2">
    </div>

    <div class="group">
      <label for="rotation">Rotation</label>
      <input id="rotation" type="range" min="0" max="2" step="0.01" value="0.7">
    </div>

    <div class="group">
      <label for="pulse">Pulsation</label>
      <input id="pulse" type="range" min="0.2" max="2.5" step="0.01" value="1.1">
    </div>

    <div class="group">
      <button id="exportBtn">Exporter en PNG</button>
    </div>
  </div>
  <div style="position:relative;">
    <canvas id="view"></canvas>
    <div class="meta">Version logiciel autonome — HTML/Canvas avec export</div>
  </div>
</div>
<script>
(() => {
  const canvas = document.getElementById('view');
  const ctx = canvas.getContext('2d');
  const DPR = Math.min(window.devicePixelRatio || 1, 2);
  const intensity = document.getElementById('intensity');
  const rotation = document.getElementById('rotation');
  const pulse = document.getElementById('pulse');
  const mode = document.getElementById('mode');
  const exportBtn = document.getElementById('exportBtn');
  let w=0,h=0,t=0;

  function resize() {
    const rect = canvas.getBoundingClientRect();
    w = canvas.width = Math.floor(rect.width * DPR);
    h = canvas.height = Math.floor(rect.height * DPR);
  }
  addEventListener('resize', resize);
  resize();

  exportBtn.addEventListener('click', () => {
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = 'helios_astro_module.png';
    a.click();
  });

  function glow(x,y,r,c,a) {
    const g = ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0, `rgba(${c[0]},${c[1]},${c[2]},${a})`);
    g.addColorStop(1, `rgba(${c[0]},${c[1]},${c[2]},0)`);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fill();
  }

  function drawFusion(cx, cy, R, time, I, rot, P, currentMode) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(time * 0.04 * rot);

    if (currentMode === 'organic' || currentMode === 'fusion') {
      const petals = 40;
      for (let i=0;i<petals;i++) {
        const a = i / petals * Math.PI * 2;
        const rr = R * (0.55 + 0.24 * Math.sin(a * 6 + time * P));
        const x = Math.cos(a) * rr;
        const y = Math.sin(a) * rr;
        ctx.strokeStyle = `rgba(60,180,255,${0.06 * I})`;
        ctx.lineWidth = 0.8 * DPR;
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.quadraticCurveTo(x * 0.4, y * 0.4, x, y);
        ctx.stroke();
      }
    }

    if (currentMode === 'neural' || currentMode === 'fusion') {
      const nodes = 28;
      let pts = [];
      for (let i=0;i<nodes;i++) {
        const a = i / nodes * Math.PI * 2 + time * 0.1;
        const rr = R * (0.25 + (i % 7) * 0.085);
        pts.push([Math.cos(a+i*0.17)*rr, Math.sin(a-i*0.11)*rr]);
      }
      for (let i=0;i<pts.length;i++) {
        for (let j=i+1;j<pts.length;j++) {
          const dx = pts[i][0]-pts[j][0];
          const dy = pts[i][1]-pts[j][1];
          const d = Math.hypot(dx,dy);
          if (d < R * 0.75) {
            ctx.strokeStyle = `rgba(130,220,255,${0.04 * I})`;
            ctx.lineWidth = 0.7 * DPR;
            ctx.beginPath();
            ctx.moveTo(pts[i][0], pts[i][1]);
            ctx.quadraticCurveTo((pts[i][0]+pts[j][0])*0.5, (pts[i][1]+pts[j][1])*0.5, pts[j][0], pts[j][1]);
            ctx.stroke();
          }
        }
      }
      pts.forEach((p, idx) => {
        glow(p[0], p[1], 9 * DPR * I, [60,160,255], 0.12);
        glow(p[0], p[1], 3 * DPR * I, [255,240,120], 0.85 * (0.4 + 0.6 * Math.sin(time * 2 + idx)));
      });
    }

    if (currentMode === 'mandala' || currentMode === 'fusion') {
      for (let ring=1; ring<=7; ring++) {
        const rr = R * (ring / 7);
        const petals = 10 + ring * 5;
        for (let i=0;i<petals;i++) {
          const a = i / petals * Math.PI * 2;
          const x = Math.cos(a) * rr;
          const y = Math.sin(a) * rr;
          ctx.strokeStyle = `rgba(${90 + ring*12},${180 + ring*7},255,${0.05 * I})`;
          ctx.lineWidth = 0.8 * DPR;
          ctx.beginPath();
          ctx.ellipse(x, y, rr * 0.17, rr * 0.09, a + time * 0.03 * rot, 0, Math.PI*2);
          ctx.stroke();
        }
      }
    }

    glow(0,0,R*0.62,[0,255,220],0.06 * I);
    glow(0,0,R*0.26,[130,255,255],0.18 * I);
    glow(0,0,R*0.08,[255,255,255],0.85);
    ctx.restore();
  }

  function frame() {
    requestAnimationFrame(frame);
    t += 0.016;
    const I = parseFloat(intensity.value);
    const rot = parseFloat(rotation.value);
    const P = parseFloat(pulse.value);
    const currentMode = mode.value;

    ctx.clearRect(0,0,w,h);
    ctx.fillStyle = '#000';
    ctx.fillRect(0,0,w,h);

    const cx = w * 0.5;
    const cy = h * 0.5;
    const R = Math.min(w,h) * 0.23;

    for (let i=0; i<5; i++) {
      glow(cx + Math.sin(t*0.4+i)*30*DPR, cy + Math.cos(t*0.35+i)*20*DPR, R*(0.8+i*0.18), [0,120,255], 0.012);
    }

    drawFusion(cx, cy, R, t, I, rot, P, currentMode);
  }
  frame();
})();
</script>
</body>
</html>
