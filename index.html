<!-- JS ANIMATIONS -->
<script>
function setupCanvas(id) {
  const canvas = document.getElementById(id);
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = 400;
  return {canvas, ctx};
}

function animate(ctx, canvas, intensity) {
  let t = 0;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const cx = canvas.width/2;
    const cy = canvas.height/2;

    for(let i=0;i<120;i++){
      let angle = i * 0.1 + t;
      let radius = 120 + Math.sin(t + i)*50;

      let x = cx + Math.cos(angle)*radius;
      let y = cy + Math.sin(angle)*radius;

      ctx.beginPath();
      ctx.arc(x,y,2,0,Math.PI*2);
      ctx.fillStyle = `hsl(${200 + i},100%,${60 + intensity}%)`;
      ctx.shadowBlur = 20;
      ctx.shadowColor = "#00ccff";
      ctx.fill();
    }

    t += 0.01;
    requestAnimationFrame(draw);
  }
  draw();
}

const hero = setupCanvas("hero");
animate(hero.ctx, hero.canvas, 10);

const brain = setupCanvas("brain");
animate(brain.ctx, brain.canvas, 20);

const ultimate = setupCanvas("ultimate");
animate(ultimate.ctx, ultimate.canvas, 40);
</script>
