<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aperçu Cerveau Vivant — Helios Astro</title>
  <style>
    body{
      margin:0;
      background:#05070d;
      color:#fff;
      font-family:Arial, Helvetica, sans-serif;
      display:grid;
      place-items:center;
      min-height:100vh;
    }

    .wrap{
      width:min(94vw, 980px);
      padding:22px;
      border-radius:28px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 20px 80px rgba(0,0,0,.35);
      text-align:center;
    }

    img{
      width:min(100%, 700px);
      border-radius:24px;
      display:block;
      margin:0 auto 18px;
    }

    a{
      display:inline-block;
      text-decoration:none;
      padding:14px 22px;
      border-radius:999px;
      background:linear-gradient(90deg,#9fdcff,#76c1ff,#f2d37a);
      color:#07101e;
      font-weight:800;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="assets/brain.png" alt="Aperçu cerveau vivant">
    <h1>Cerveau vivant — aperçu</h1>
    <p>Accédez à la version animée complète du cerveau vivant.</p>
    <a href="cerveau.html">Ouvrir le logiciel animé</a>
  </div>
</body>
</html>
